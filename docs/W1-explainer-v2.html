<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Choosy — explainer v2</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;500;700;800&family=Righteous&family=Rubik:wght@500;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#fbf5ea; --surface:#fffaf2; --ink:#33271e; --soft:#8a7b6b;
    --primary:#ce551f; --rust:#a23a12; --mustard:#e0a33e; --line:#eaddc8; --green:#3fbf4a; --teal:#5bbfb5;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%;background:#c9bca6;display:flex;align-items:center;justify-content:center;font-family:'Heebo',sans-serif}
  #stage{position:relative;height:min(96vh,940px);aspect-ratio:9/16;background:var(--bg);overflow:hidden;
    border-radius:18px;box-shadow:0 20px 60px rgba(60,40,20,.4)}
  .layer{position:absolute;inset:0}
  #world{will-change:filter}

  .badge{position:absolute;top:5%;left:50%;transform:translateX(-50%);z-index:5;display:flex;align-items:center;gap:8px;
    background:#fff;border:2px solid var(--line);border-radius:30px;padding:7px 18px;opacity:0;box-shadow:0 6px 16px rgba(60,40,20,.1)}
  .badge .dot{width:12px;height:12px;border-radius:50%}
  .badge .t{font-family:'Rubik';font-weight:800;font-size:calc(1.3vh + 5px);color:var(--ink)}
  #badgeA .dot{background:var(--soft)} #badgeB .dot{background:var(--primary)}

  .phone{position:absolute;left:50%;top:55%;transform:translate(-50%,-50%);width:64%;height:62%;background:#2a2018;border-radius:34px;padding:13px;box-shadow:0 24px 50px rgba(40,25,12,.35)}
  .screen{position:relative;width:100%;height:100%;background:var(--surface);border-radius:24px;overflow:hidden}

  #gridWrap{position:absolute;inset:0;overflow:hidden;padding:12px}
  #grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:9px}
  .gtile{background:#fff;border:1.5px solid var(--line);border-radius:10px;padding:12% 8% 8%;display:flex;flex-direction:column;gap:5px;align-items:center}
  .gtile svg{width:66%;fill:#cfc4b2}
  .gbar{width:74%;height:5px;border-radius:4px;background:#e9e0d0}
  .gpill{width:40%;height:7px;border-radius:5px;background:#ddd2bf}
  .counter{position:absolute;bottom:12px;left:50%;transform:translateX(-50%);z-index:4;background:rgba(42,32,24,.9);color:#fff;
    font-family:'Rubik';font-weight:800;font-size:calc(1vh + 6px);padding:6px 16px;border-radius:20px;opacity:0;white-space:nowrap}

  #duel{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:5%;opacity:0;padding:7%}
  .ortag{font-family:'Rubik';font-weight:800;color:#fff;background:var(--primary);padding:5px 18px;border-radius:20px;font-size:calc(1.4vh + 5px);opacity:0;box-shadow:0 5px 14px rgba(206,85,31,.3)}
  .dcards{display:flex;gap:7%;width:100%;justify-content:center;align-items:stretch}
  .dcard{position:relative;flex:1;background:#fff;border:2px solid var(--line);border-radius:18px;padding:8% 6%;display:flex;flex-direction:column;align-items:center;gap:9px;box-shadow:0 8px 20px rgba(60,40,20,.1)}
  .imgwrap{width:100%;background:#f5efe4;border-radius:12px;padding:12% 0;display:flex;justify-content:center}
  .dcard svg{width:62%}
  .dcard .nm{width:72%;height:7px;border-radius:4px;background:#e9e0d0}
  .dcard .pr{font-family:'Rubik';font-weight:800;color:var(--primary);font-size:calc(1.1vh + 4px);background:#fbe7da;padding:3px 14px;border-radius:14px}
  .heart{position:absolute;top:8px;right:10px;color:var(--line);font-size:calc(1.4vh + 4px)}
  .check{position:absolute;top:-12px;right:-12px;width:30%;aspect-ratio:1;border-radius:50%;background:var(--green);color:#fff;display:flex;align-items:center;justify-content:center;
    font-family:'Rubik';font-weight:800;font-size:calc(2vh + 8px);opacity:0;box-shadow:0 6px 16px rgba(63,191,74,.4);z-index:3}
  .finger{position:absolute;width:32px;height:32px;border-radius:50%;background:rgba(206,85,31,.25);border:2.5px solid var(--primary);opacity:0;z-index:8}

  .choosy{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);z-index:9;display:flex;flex-direction:column;align-items:center;gap:12px;opacity:0}
  .cmark{width:16vh;max-width:130px;aspect-ratio:1;filter:drop-shadow(0 8px 20px rgba(206,85,31,.3))}
  .cword{font-family:'Righteous';color:var(--primary);font-size:calc(3vh + 10px)}

  .end{position:absolute;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:12% 9%;opacity:0;z-index:12}
  .end .hook{font-family:'Rubik';font-weight:800;color:var(--primary);font-size:calc(2.5vh + 8px);line-height:1.3;margin-bottom:7%}
  .end .lead{font-family:'Heebo';font-weight:500;color:var(--ink);font-size:calc(1.7vh + 5px);margin-bottom:4%}
  .end .ben{font-family:'Rubik';font-weight:700;color:var(--ink);font-size:calc(2vh + 6px);line-height:1.9}
  .end .cword2{font-family:'Righteous';color:var(--primary);font-size:calc(4.4vh + 12px);margin:5% 0 4%}
  .end .sl{font-family:'Rubik';font-weight:700;color:var(--ink);font-size:calc(2.1vh + 6px);line-height:1.45}
  .end .sl b{color:var(--primary)}
  .end .url{font-family:'Heebo';font-weight:500;color:var(--rust);font-size:calc(1.6vh + 5px);margin-top:7%;letter-spacing:.5px}

  #replay{position:absolute;bottom:14px;right:14px;z-index:30;background:rgba(42,32,24,.82);color:#fff;border:none;font-family:'Heebo';font-size:13px;padding:7px 14px;border-radius:18px;cursor:pointer;opacity:0}
</style>
</head>
<body>
<div id="stage">
  <div id="world" class="layer">

    <div class="badge" id="badgeA"><span class="dot"></span><span class="t">A regular store</span></div>
    <div class="badge" id="badgeB"><span class="dot"></span><span class="t">Choosy</span></div>

    <div class="phone">
      <div class="screen">
        <div id="gridWrap"><div id="grid"></div></div>
        <div class="counter" id="counter">0 items</div>

        <div id="duel">
          <div class="ortag" id="ortag">or</div>
          <div class="dcards">
            <div class="dcard" id="dL"><span class="heart">&#9825;</span><div class="imgwrap"><svg viewBox="0 0 100 100"><path d="M32 16 Q42 26 50 26 Q58 26 68 16 L84 30 Q86 33 83 36 L73 44 L70 40 L70 84 Q70 87 67 87 L33 87 Q30 87 30 84 L30 40 L27 44 L17 36 Q14 33 16 30 Z"/></svg></div><div class="nm"></div><div class="pr">&#8362;89</div><div class="check" id="checkL">&#10003;</div></div>
            <div class="dcard" id="dR"><span class="heart">&#9825;</span><div class="imgwrap"><svg viewBox="0 0 100 100"><path d="M32 16 Q42 26 50 26 Q58 26 68 16 L84 30 Q86 33 83 36 L73 44 L70 40 L70 84 Q70 87 67 87 L33 87 Q30 87 30 84 L30 40 L27 44 L17 36 Q14 33 16 30 Z"/></svg></div><div class="nm"></div><div class="pr">&#8362;79</div><div class="check" id="checkR">&#10003;</div></div>
          </div>
        </div>
        <div class="finger" id="finger"></div>
      </div>
    </div>

  </div>

  <div class="choosy" id="choosy">
    <svg class="cmark" viewBox="0 0 64 64"><rect width="64" height="64" rx="15" fill="#ce551f"/><circle cx="25" cy="33" r="8.5" fill="#fbf5ea"/><circle cx="44" cy="33" r="8.5" fill="none" stroke="#fbf5ea" stroke-width="3.5"/></svg>
    <div class="cword">CHOOSY</div>
  </div>

  <div class="end" id="end1">
    <div class="hook">Stop wasting time<br>and leaving shopping<br>frustrated.</div>
    <div class="lead">Choosy helps you</div>
    <div class="ben">shop smart,<br>find fast,<br>save time,<br>and enjoy the ride.</div>
  </div>
  <div class="end" id="end2">
    <svg class="cmark" viewBox="0 0 64 64" style="width:17vh;max-width:135px"><rect width="64" height="64" rx="15" fill="#ce551f"/><circle cx="25" cy="33" r="8.5" fill="#fbf5ea"/><circle cx="44" cy="33" r="8.5" fill="none" stroke="#fbf5ea" stroke-width="3.5"/></svg>
    <div class="cword2">CHOOSY</div>
    <div class="sl">Stop searching,<br>start <b>finding</b>.</div>
    <div class="url">choosybuy.com</div>
  </div>

  <button id="replay">&#8635; Replay</button>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
<script>
  var SHIRT_P='M32 16 Q42 26 50 26 Q58 26 68 16 L84 30 Q86 33 83 36 L73 44 L70 40 L70 84 Q70 87 67 87 L33 87 Q30 87 30 84 L30 40 L27 44 L17 36 Q14 33 16 30 Z';
  var E=function(id){return document.getElementById(id)};
  var g='';for(var i=0;i<63;i++)g+='<div class="gtile"><svg viewBox="0 0 100 100"><path d="'+SHIRT_P+'"/></svg><div class="gbar"></div><div class="gpill"></div></div>';
  E('grid').innerHTML=g;
  function setColor(side,c){E(side).querySelector('path').style.fill=c}

  function gray(v){E('world').style.filter='grayscale('+v+') saturate('+(1-v*0.65)+')'}
  var tl;
  function build(){
    gray(1); setColor('dL','#5bbfb5'); setColor('dR','#3a7bd5');
    tl=gsap.timeline();

    // ===== EXPERIENCE A — regular store (~4s): products accelerate fast, numbers slower, never reaches bottom =====
    tl.from('.phone',{y:40,opacity:0,scale:.92,duration:.55,ease:'power3.out'});
    tl.to('#badgeA',{opacity:1,duration:.35},'-=.2').from('#badgeA',{y:-14,duration:.35},'<');
    tl.to('#counter',{opacity:1,duration:.3},.6);
    var grid=E('grid');
    // scroll only partway so there are always more products below; products ramp HARD (power4.in)
    tl.fromTo(grid,{y:0},{y:-grid.scrollHeight*0.45,duration:3.9,ease:'power4.in'},.7);
    var cobj={n:0};
    // numbers ramp GENTLER (power1.in) so they read as climbing, not blurring as fast
    tl.to(cobj,{n:1000000,duration:3.9,ease:'power1.in',onUpdate:function(){E('counter').textContent=Math.round(cobj.n).toLocaleString()+' items'}},.7);
    tl.to('.phone',{x:'+=5',duration:.045,repeat:13,yoyo:true,ease:'none'},3.9); // judder at blur peak

    // ===== TURN — Choosy enters, color floods in =====
    tl.to(['#counter','#badgeA'],{opacity:0,duration:.3},4.6);
    tl.set('#choosy',{opacity:1});
    tl.from('.choosy .cmark',{scale:0,rotation:-20,duration:.75,ease:'back.out(1.8)'},4.8);
    tl.from('.choosy .cword',{y:20,opacity:0,duration:.4,ease:'power2.out'},'-=.3');
    tl.to({v:1},{v:0,duration:1.0,ease:'power2.inOut',onUpdate:function(){gray(this.targets()[0].v)}},5.1);
    tl.to('#gridWrap',{opacity:0,duration:.4},5.7);
    tl.to('#choosy',{y:'-=180',scale:.5,opacity:0,duration:.55,ease:'power2.in'},6.4);

    // ===== EXPERIENCE B — Choosy =====
    tl.to('#badgeB',{opacity:1,duration:.4},6.6).from('#badgeB',{y:-14,duration:.4},'<');
    tl.set('#duel',{opacity:1});
    tl.from('#dL',{x:-40,opacity:0,duration:.5,ease:'power3.out'},6.7);
    tl.from('#dR',{x:40,opacity:0,duration:.5,ease:'power3.out'},6.7);
    tl.fromTo('#ortag',{scale:0,opacity:0},{scale:1,opacity:1,duration:.45,ease:'back.out(2)'},7.4);

    function tap(side,at){
      var el=E(side);
      tl.add(function(){var r=el.getBoundingClientRect(),s=E('stage').getBoundingClientRect();
        gsap.set('#finger',{left:r.left-s.left+r.width/2-16,top:r.top-s.top+r.height/2-16});},at);
      tl.to('#finger',{opacity:1,scale:.8,duration:.16},at);
      tl.to('#finger',{scale:1.1,duration:.14,yoyo:true,repeat:1},at+.16);
      tl.to(el,{scale:1.05,borderColor:'#ce551f',duration:.16,yoyo:true,repeat:1},at+.18);
      tl.to('#finger',{opacity:0,duration:.16},at+.44);
    }
    function swap(side,color,at){
      var dir = side==='dL' ? -34 : 34;
      tl.to('#'+side,{x:dir,opacity:0,duration:.26,ease:'power2.in'},at);
      tl.add(function(){setColor(side,color)},at+.28);
      tl.fromTo('#'+side,{x:dir,opacity:0},{x:0,opacity:1,duration:.3,ease:'power3.out'},at+.3);
    }
    // R1: choose RIGHT(blue). loser LEFT swaps.
    tap('dR',8.0);  swap('dL','#d4537e',8.5);
    // R2: choose LEFT(pink). loser RIGHT swaps -> orange (champion-to-be).
    tap('dL',9.1);  swap('dR','#e0833a',9.6);
    // R3: choose RIGHT(orange). loser LEFT swaps.
    tap('dR',10.2); swap('dL','#8d63c9',10.7);
    // R4: choose RIGHT(orange) again. loser LEFT swaps.
    tap('dR',11.3); swap('dL','#2f9e8f',11.8);
    // R5: choose RIGHT(orange) a third time in a row -> CHAMPION.
    tap('dR',12.4);
    tl.to(['#dL','#ortag'],{opacity:0,scale:.85,duration:.35,ease:'power2.in'},13.0);
    tl.add(function(){
      var r=E('dR').getBoundingClientRect(),s=E('stage').getBoundingClientRect();
      var dx=(s.left+s.width/2)-(r.left+r.width/2);
      gsap.to('#dR',{x:'+='+dx,scale:1.34,duration:.6,ease:'back.out(1.6)'});
    },13.1);
    tl.to('#dR',{boxShadow:'0 0 36px rgba(63,191,74,.55)',borderColor:'#3fbf4a',duration:.4},13.3);
    tl.fromTo('#checkR',{scale:0},{scale:1,opacity:1,duration:.4,ease:'back.out(2.2)'},13.6);

    // ===== END SLIDES =====
    tl.to(['#duel','#badgeB'],{opacity:0,duration:.5},15.4);
    tl.to('#end1',{opacity:1,duration:.6},15.9);
    tl.from('#end1 .hook',{y:20,opacity:0,duration:.5},16.0);
    tl.from('#end1 .ben',{y:20,opacity:0,duration:.5},16.4);
    tl.to('#end1',{opacity:0,duration:.5},20.4);
    tl.to('#end2',{opacity:1,duration:.6},20.9);
    tl.from('#end2 .cmark',{scale:0,duration:.6,ease:'back.out(1.7)'},21.0);
    tl.from('#end2 .sl',{y:16,opacity:0,duration:.5},21.5);
    tl.to('#replay',{opacity:1,duration:.4},24.8);
  }
  function start(){ if(tl) tl.kill(); gsap.set(['#dL','#dR','#checkL','#checkR','#ortag','#finger'],{clearProps:'all'}); build(); }
  E('replay').addEventListener('click',start);
  window.addEventListener('load',function(){ setTimeout(start,500); });
</script>
</body>
</html>

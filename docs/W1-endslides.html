<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
<meta charset="utf-8">
<title>Choosy — end slides</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;500;700;800&family=Righteous&family=Rubik:wght@500;700;800&display=swap" rel="stylesheet">
<style>
  :root{ --bg:#fbf5ea; --ink:#33271e; --primary:#ce551f; --rust:#a23a12; }
  *{margin:0;box-sizing:border-box}
  body{background:#d9cdb8;font-family:'Heebo',sans-serif;padding:30px;display:flex;flex-wrap:wrap;gap:30px;justify-content:center}
  .wrap{text-align:center}
  .tag{color:#5b4a38;font-weight:700;margin-bottom:10px;font-size:14px}
  /* 9:16 frame shown at 360x640; export at 3x = 1080x1920 */
  .slide{width:360px;height:640px;background:var(--bg);border-radius:18px;overflow:hidden;
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    padding:54px 40px;box-shadow:0 10px 30px rgba(70,50,30,.25);text-align:center}
  /* slide 1 — value */
  .hook{font-family:'Rubik';font-weight:800;color:var(--primary);font-size:29px;line-height:1.3;margin-bottom:34px}
  .lead{font-family:'Heebo';font-weight:500;color:var(--ink);font-size:21px;margin-bottom:14px}
  .benefits{font-family:'Rubik';font-weight:700;color:var(--ink);font-size:23px;line-height:1.9}
  /* slide 2 — logo */
  .mark{width:100px;height:100px;margin-bottom:24px}
  .word{font-family:'Righteous';color:var(--primary);font-size:54px;letter-spacing:1px;margin-bottom:24px}
  .sl{font-family:'Rubik';font-weight:700;color:var(--ink);font-size:26px;line-height:1.45}
  .sl b{color:var(--primary)}
  .url{font-family:'Heebo';font-weight:500;color:var(--rust);font-size:20px;letter-spacing:.5px;margin-top:22px}
</style>
</head>
<body>

  <div class="wrap">
    <div class="tag">Slide 1 · value</div>
    <div class="slide">
      <div class="hook">Stop wasting time<br>and leaving shopping<br>frustrated.</div>
      <div class="lead">Choosy helps you</div>
      <div class="benefits">
        shop smart,<br>
        find fast,<br>
        save time,<br>
        and enjoy the ride.
      </div>
    </div>
  </div>

  <div class="wrap">
    <div class="tag">Slide 2 · logo</div>
    <div class="slide">
      <svg class="mark" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg" aria-label="Choosy">
        <rect width="64" height="64" rx="15" fill="#ce551f"/>
        <circle cx="25" cy="33" r="8.5" fill="#fbf5ea"/>
        <circle cx="44" cy="33" r="8.5" fill="none" stroke="#fbf5ea" stroke-width="3.5"/>
      </svg>
      <div class="word">CHOOSY</div>
      <div class="sl">Stop searching,<br>start <b>finding</b>.</div>
      <div class="url">choosybuy.com</div>
    </div>
  </div>

</body>
</html>

<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Choosy — explainer animation</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;500;700;800&family=Righteous&family=Rubik:wght@500;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#fbf5ea; --surface:#fffaf2; --ink:#33271e; --soft:#8a7b6b;
    --primary:#ce551f; --rust:#a23a12; --mustard:#e0a33e; --line:#eaddc8;
    --green:#4caf3f; --green-bright:#3fd23f;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%;background:#cfc3ad;display:flex;align-items:center;justify-content:center;font-family:'Heebo',sans-serif}
  /* 9:16 stage, scales to viewport height (vector = stays crisp at any size) */
  #stage{position:relative;height:min(96vh,960px);aspect-ratio:9/16;background:var(--bg);
    overflow:hidden;border-radius:14px;box-shadow:0 14px 50px rgba(60,40,20,.35)}
  .layer{position:absolute;inset:0}
  /* the storytelling scene is greyscale during the "problem", then color blooms */
  #scene{filter:grayscale(1) contrast(.98);transition:filter 1.1s ease}
  #scene.alive{filter:grayscale(0) contrast(1)}

  /* window with sun/moon */
  .window{position:absolute;top:5%;left:8%;width:30%;height:15%;background:#bcd7e6;border:3px solid var(--ink);border-radius:6px;overflow:hidden}
  .window .sky{position:absolute;inset:0;background:#bcd7e6;transition:background .4s}
  .sun{position:absolute;width:26%;aspect-ratio:1;border-radius:50%;background:var(--mustard);left:36%;top:120%}
  .win-cross{position:absolute;background:var(--ink)}

  /* wall clock */
  .clock{position:absolute;top:6%;right:9%;width:17%;aspect-ratio:1;border-radius:50%;background:#fff;border:4px solid var(--ink)}
  .hand{position:absolute;left:50%;bottom:50%;transform-origin:bottom center;background:var(--ink);border-radius:3px}
  .hand.min{width:3px;height:36%}
  .hand.hr{width:4px;height:24%}
  .clock .pin{position:absolute;width:8px;height:8px;background:var(--rust);border-radius:50%;left:50%;top:50%;transform:translate(-50%,-50%)}

  /* phone */
  .phone{position:absolute;left:50%;top:53%;transform:translate(-50%,-50%);width:60%;height:64%;background:var(--ink);border-radius:30px;padding:14px}
  .screen{position:relative;width:100%;height:100%;background:var(--surface);border-radius:20px;overflow:hidden}

  /* phase 1: scrolling grid of grey clothing tiles */
  #grid{position:absolute;inset:0;padding:10px}
  .col{display:grid;grid-template-columns:1fr 1fr;gap:10px;animation:scrollUp 6s linear infinite}
  #grid.fast .col{animation-duration:1.1s}
  @keyframes scrollUp{from{transform:translateY(0)}to{transform:translateY(-50%)}}
  .tile{background:#e7ded0;border:1.5px solid var(--line);border-radius:10px;aspect-ratio:1;display:flex;align-items:center;justify-content:center}
  .tile svg{width:62%;height:62%;fill:#b9ab97}

  /* rising counter (digits are universal) */
  .counter{position:absolute;top:8px;left:50%;transform:translateX(-50%);background:rgba(51,39,30,.85);color:#fff;
    font-family:'Rubik';font-weight:700;font-size:calc(.9vh + 6px);padding:4px 12px;border-radius:20px;z-index:3;opacity:0;transition:opacity .3s}

  /* phase 2: duel */
  #duel{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4%;opacity:0;transition:opacity .4s}
  .cards{display:flex;gap:8%;width:90%;justify-content:center}
  .card{flex:1;max-width:42%;background:#fff;border:2px solid var(--line);border-radius:14px;padding:10% 6%;display:flex;flex-direction:column;align-items:center;gap:8px;transition:transform .25s, border-color .25s, opacity .3s}
  .card svg{width:80%;fill:var(--soft)}
  .card.green svg{fill:var(--green)}
  .card.tap{border-color:var(--primary);transform:scale(1.06)}
  .card.dim{opacity:.25;transform:scale(.92)}
  .vs{font-family:'Rubik';font-weight:800;color:var(--primary);font-size:calc(1.6vh + 6px)}
  .finger{position:absolute;width:26px;height:26px;border-radius:50%;background:rgba(206,85,31,.35);border:2px solid var(--primary);opacity:0;transition:all .25s;z-index:4}
  .check{position:absolute;top:18%;font-family:'Rubik';color:#fff;background:var(--green);width:14%;aspect-ratio:1;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:calc(1.6vh + 8px);opacity:0;transform:scale(.4);transition:all .35s}
  .buybtn{margin-top:6%;background:var(--primary);color:#fff;font-family:'Rubik';font-weight:700;padding:8px 22px;border-radius:20px;font-size:calc(1vh + 5px);opacity:0;transition:opacity .3s}

  /* Choosy logo pop */
  .choosy{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%) scale(.4);opacity:0;z-index:6;display:flex;flex-direction:column;align-items:center;gap:10px;transition:transform .5s cubic-bezier(.2,1.4,.4,1), opacity .4s}
  .choosy.show{opacity:1;transform:translate(-50%,-50%) scale(1)}
  .choosy.tuck{opacity:0;transform:translate(-50%,-130%) scale(.55)}
  .mark{width:14vh;max-width:120px;aspect-ratio:1}
  .cw{font-family:'Righteous';color:var(--primary);font-size:calc(2.4vh + 10px)}

  /* delivery + joy */
  .joy{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3%;opacity:0;transition:opacity .5s}
  .box{font-size:0;position:relative;width:34%}
  .shirt-big{width:40%}
  .shirt-big svg{width:100%;fill:var(--green-bright);filter:drop-shadow(0 0 16px rgba(63,210,63,.6))}
  .kid{display:flex;flex-direction:column;align-items:center}
  .kid .head{width:9vh;max-width:74px;aspect-ratio:1;border-radius:50%;background:#f0d9bf;border:3px solid var(--ink);position:relative}
  .kid .smile{position:absolute;width:46%;height:24%;border:3px solid var(--ink);border-top:none;border-radius:0 0 40px 40px;left:27%;top:42%}
  .kid .eye{position:absolute;width:7px;height:7px;background:var(--ink);border-radius:50%;top:34%}
  .kid .eye.l{left:30%}.kid .eye.r{right:30%}
  .kid .body{width:12vh;max-width:96px;height:8vh;max-height:64px;background:var(--green-bright);border-radius:14px 14px 8px 8px;margin-top:-6px}
  .confetti{position:absolute;width:10px;height:14px;border-radius:2px;top:-10%;opacity:0}

  /* end slides */
  .end{position:absolute;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;
    text-align:center;padding:12% 9%;opacity:0;transition:opacity .6s;z-index:8}
  .end .hook{font-family:'Rubik';font-weight:800;color:var(--primary);font-size:calc(2.4vh + 8px);line-height:1.3;margin-bottom:6%}
  .end .lead{font-family:'Heebo';font-weight:500;color:var(--ink);font-size:calc(1.6vh + 5px);margin-bottom:4%}
  .end .ben{font-family:'Rubik';font-weight:700;color:var(--ink);font-size:calc(1.9vh + 6px);line-height:1.85}
  .end .cw2{font-family:'Righteous';color:var(--primary);font-size:calc(4vh + 12px);margin:5% 0 4%}
  .end .sl{font-family:'Rubik';font-weight:700;color:var(--ink);font-size:calc(2vh + 6px);line-height:1.4}
  .end .sl b{color:var(--primary)}
  .end .url{font-family:'Heebo';font-weight:500;color:var(--rust);font-size:calc(1.5vh + 5px);margin-top:6%;letter-spacing:.5px}

  #replay{position:absolute;bottom:12px;right:12px;z-index:20;background:rgba(51,39,30,.8);color:#fff;border:none;
    font-family:'Heebo';font-size:13px;padding:6px 12px;border-radius:16px;cursor:pointer;opacity:0;transition:opacity .3s}
  #replay.show{opacity:1}
</style>
</head>
<body>
<div id="stage">

  <div id="scene" class="layer">
    <div class="window">
      <div class="sky" id="sky"></div>
      <div class="sun" id="sun"></div>
      <div class="win-cross" style="left:48%;top:0;width:3px;height:100%"></div>
      <div class="win-cross" style="left:0;top:48%;width:100%;height:3px"></div>
    </div>

    <div class="clock">
      <div class="hand min" id="handMin"></div>
      <div class="hand hr" id="handHr"></div>
      <div class="pin"></div>
    </div>

    <div class="phone">
      <div class="screen">
        <div class="counter" id="counter">0</div>
        <div id="grid"><div class="col" id="col"></div></div>

        <div id="duel">
          <div class="vs">?</div>
          <div class="cards">
            <div class="card" id="cardL"><svg viewBox="0 0 100 100"><path d="M30 16 L42 16 Q50 24 58 16 L70 16 L86 32 L74 44 L70 40 L70 86 L30 86 L30 40 L26 44 L14 32 Z"/></svg></div>
            <div class="card" id="cardR"><svg viewBox="0 0 100 100"><path d="M30 16 L42 16 Q50 24 58 16 L70 16 L86 32 L74 44 L70 40 L70 86 L30 86 L30 40 L26 44 L14 32 Z"/></svg></div>
          </div>
          <div class="check" id="check">✓</div>
          <div class="buybtn" id="buybtn">★</div>
        </div>
        <div class="finger" id="finger"></div>
      </div>
    </div>

    <div class="joy" id="joy">
      <div class="kid">
        <div class="head"><span class="eye l"></span><span class="eye r"></span><span class="smile"></span></div>
        <div class="body"></div>
      </div>
    </div>
  </div>

  <div class="choosy" id="choosy">
    <svg class="mark" viewBox="0 0 64 64"><rect width="64" height="64" rx="15" fill="#ce551f"/><circle cx="25" cy="33" r="8.5" fill="#fbf5ea"/><circle cx="44" cy="33" r="8.5" fill="none" stroke="#fbf5ea" stroke-width="3.5"/></svg>
    <div class="cw">CHOOSY</div>
  </div>

  <div class="end" id="end1">
    <div class="hook">Stop wasting time<br>and leaving shopping<br>frustrated.</div>
    <div class="lead">Choosy helps you</div>
    <div class="ben">shop smart,<br>find fast,<br>save time,<br>and enjoy the ride.</div>
  </div>

  <div class="end" id="end2">
    <svg class="mark" viewBox="0 0 64 64" style="width:16vh;max-width:130px"><rect width="64" height="64" rx="15" fill="#ce551f"/><circle cx="25" cy="33" r="8.5" fill="#fbf5ea"/><circle cx="44" cy="33" r="8.5" fill="none" stroke="#fbf5ea" stroke-width="3.5"/></svg>
    <div class="cw2">CHOOSY</div>
    <div class="sl">Stop searching,<br>start <b>finding</b>.</div>
    <div class="url">choosybuy.com</div>
  </div>

  <button id="replay" onclick="play()">↻ Replay</button>
</div>

<script>
  var SHIRT='<svg viewBox="0 0 100 100"><path d="M30 16 L42 16 Q50 24 58 16 L70 16 L86 32 L74 44 L70 40 L70 86 L30 86 L30 40 L26 44 L14 32 Z"/></svg>';
  // build the scrolling grid (duplicated for seamless loop)
  var col=document.getElementById('col'),h='';
  for(var i=0;i<28;i++) h+='<div class="tile">'+SHIRT+'</div>';
  col.innerHTML=h+h;
  var E=function(id){return document.getElementById(id)};
  var timers=[];
  function at(ms,fn){timers.push(setTimeout(fn,ms))}
  function clear(){timers.forEach(clearTimeout);timers=[]}

  function reset(){
    clear();
    E('scene').classList.remove('alive');
    E('grid').classList.remove('fast');E('grid').style.opacity=1;
    E('counter').style.opacity=0;E('counter').textContent='0';
    E('duel').style.opacity=0;E('joy').style.opacity=0;
    E('choosy').className='choosy';
    E('check').style.opacity=0;E('check').style.transform='scale(.4)';
    E('buybtn').style.opacity=0;
    ['cardL','cardR'].forEach(function(c){E(c).className='card'});
    E('end1').style.opacity=0;E('end2').style.opacity=0;
    E('replay').classList.remove('show');
    E('sun').style.transition='none';E('sun').style.top='120%';
    E('finger').style.opacity=0;
  }

  function play(){
    reset();
    // PHASE 1 — endless searching, time wasting
    at(300,function(){E('counter').style.opacity=1});
    var n=0,ci=setInterval(function(){n+=7;E('counter').textContent=n},90);timers.push(ci);
    at(2500,function(){E('grid').classList.add('fast')}); // scroll accelerates
    // sun/moon cycle (time passing) — 3 cycles
    function cycle(t){
      at(t,function(){E('sun').style.transition='top 1.1s linear,background .3s';E('sun').style.background='var(--mustard)';E('sun').style.top='30%';E('sky').style.background='#bcd7e6'});
      at(t+1200,function(){E('sun').style.top='120%'});
      at(t+1500,function(){E('sky').style.background='#2b3a52';E('sun').style.background='#dfe6ef';E('sun').style.top='30%'}); // moon/night
      at(t+2700,function(){E('sun').style.top='120%'});
    }
    cycle(600);cycle(3300);cycle(6000);
    // clock hands spin (CSS via inline animation)
    E('handMin').style.animation='spin 0.7s linear infinite';
    E('handHr').style.animation='spin 4.2s linear infinite';

    // ~9.5s — CHOOSY enters, world turns to color
    at(9400,function(){clearInterval(ci)});
    at(9500,function(){E('choosy').classList.add('show')});
    at(10200,function(){E('scene').classList.add('alive')}); // color bloom
    at(11200,function(){E('choosy').classList.add('tuck')}); // logo tucks up, hand to phone
    at(11400,function(){E('grid').style.opacity=0;E('counter').style.opacity=0;E('handMin').style.animation='spin 6s linear infinite';E('handHr').style.animation='spin 30s linear infinite'});

    // PHASE 2 — the duel
    at(11700,function(){E('duel').style.opacity=1});
    function tap(card,t){
      at(t,function(){var f=E('finger');var r=E(card).getBoundingClientRect(),s=E('stage').getBoundingClientRect();
        f.style.left=(r.left-s.left+r.width/2-13)+'px';f.style.top=(r.top-s.top+r.height/2-13)+'px';f.style.opacity=1;});
      at(t+200,function(){E(card).classList.add('tap')});
      at(t+450,function(){E('finger').style.opacity=0});
    }
    // round 1
    tap('cardR',12300);
    at(12900,function(){E('cardL').className='card dim'});
    at(13300,function(){E('cardL').className='card';E('cardR').className='card'}); // new pair
    // round 2
    tap('cardL',13800);
    at(14400,function(){E('cardR').className='card dim'});
    at(14800,function(){E('cardL').className='card';E('cardR').className='card'});
    // round 3 -> winner (green)
    tap('cardL',15300);
    at(15900,function(){E('cardR').className='card dim';E('cardL').className='card green tap'});
    at(16300,function(){E('check').style.opacity=1;E('check').style.transform='scale(1)';E('buybtn').style.opacity=1});

    // PHASE 3 — delivery + joy + color
    at(18200,function(){E('duel').style.opacity=0});
    at(18600,function(){E('joy').style.opacity=1;burst()});

    // END SLIDES
    at(22500,function(){E('joy').style.opacity=0;E('end1').style.opacity=1});
    at(27000,function(){E('end1').style.opacity=0});
    at(27600,function(){E('end2').style.opacity=1});
    at(34000,function(){E('replay').classList.add('show')});
  }

  function burst(){
    var cols=['#ce551f','#e0a33e','#3fd23f','#4caf3f','#5bbfb5'];
    for(var i=0;i<22;i++){(function(i){
      var c=document.createElement('div');c.className='confetti';
      c.style.background=cols[i%cols.length];c.style.left=(20+Math.random()*60)+'%';
      E('joy').appendChild(c);
      at(0,function(){c.style.transition='all '+(1.4+Math.random())+'s ease-out';c.style.opacity=1;
        c.style.top=(60+Math.random()*30)+'%';c.style.transform='translateX('+(Math.random()*120-60)+'px) rotate('+(Math.random()*360)+'deg)';});
      at(2200,function(){c.remove()});
    })(i)}
  }

  // clock spin keyframe (injected)
  var st=document.createElement('style');st.textContent='@keyframes spin{to{transform:rotate(360deg)}}';document.head.appendChild(st);
  window.addEventListener('load',function(){setTimeout(play,400)});
</script>
</body>
</html>
